<section id="beautySection">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    #beautySection{
      --ink:#111; --muted:#6b7280; --line:#e6e6e6; --surface:#fff;
      --shadow:0 10px 30px rgba(0,0,0,.12);
      --brand:#111; --radius:18px; --max:1200px;
      --gap:22px;                  /* 카드 사이 간격(js에서도 읽음) */
      --thumb-h:8px;               /* 하단 스크롤바 높이 */
      --accent:#1f6b4a;            /* 스크롤바 포커스/호버 색 */
    }
    #beautySection *{box-sizing:border-box}
    #beautySection .wrap{
      max-width:var(--max); margin:0 auto; padding:48px 16px 28px;
      font-family:"Pretendard",system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,Malgun Gothic,sans-serif; color:var(--ink);
    }

    /* 헤더 */
    #beautySection .header{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;margin-bottom:18px;}
    #beautySection h2{margin:0 0 8px;font-size:clamp(28px,3.2vw,44px);line-height:1.15;letter-spacing:-.02em;font-weight:800;color:var(--brand)}
    #beautySection .subtitle{margin:0 0 8px;font-weight:600}
    #beautySection .desc{margin:6px 0 0;color:var(--muted);line-height:1.6}
    #beautySection .controls{display:flex;gap:12px;align-items:center;justify-content:flex-end}
    #beautySection .ctrl-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer;transition:.2s}
    #beautySection .ctrl-btn:hover{box-shadow:0 6px 18px rgba(0,0,0,.10)}
    #beautySection .ctrl-btn:active{transform:scale(.98)}
    #beautySection .ctrl-btn svg{width:18px;height:18px}

    /* 트랙 (가로 스크롤 + 스냅) */
    #beautySection .viewport{position:relative}
    #beautySection .track{
      display:grid; grid-auto-flow:column;
      grid-auto-columns:minmax(280px, 1fr);
      gap:var(--gap); overflow-x:auto; padding:6px 2px 14px;
      scroll-snap-type:x mandatory; scrollbar-width:none;  /* 기본 스크롤바 숨김 */
      user-select:none;                                   /* 드래그 중 텍스트 선택 방지 */
      -webkit-overflow-scrolling:touch;
    }
    #beautySection .track::-webkit-scrollbar{display:none}

    #beautySection .card{
      position:relative; scroll-snap-align:start; border-radius:var(--radius);
      overflow:hidden; background:var(--surface);
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      transition:transform .25s ease, box-shadow .25s ease;
      cursor:pointer;
    }
    #beautySection .card:hover{transform:translateY(-2px); box-shadow:var(--shadow)}

    /* 이미지 & 오버레이 */
    #beautySection .thumb{position:relative; aspect-ratio:16/9; background:#000;}
    #beautySection .thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.78)}
    #beautySection .overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.35)}
    #beautySection .year{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-weight:800;font-size:14px;background:rgba(0,0,0,.35);padding:6px 10px;border-radius:999px;backdrop-filter:saturate(140%) blur(2px)}
    #beautySection .badge{position:absolute;top:14px;left:14px;font-weight:700;font-size:12px;background:rgba(17,17,17,.55);padding:7px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.2);backdrop-filter:saturate(140%) blur(2px)}
    #beautySection .headline{font-size:clamp(16px,1.8vw,20px);font-weight:800;letter-spacing:-.01em;margin:0 0 4px}
    #beautySection .meta{margin:0;font-size:13px;opacity:.95}

    /* 모바일에서 정사각형 카드로 전환 */
    @media (max-width:640px){
      #beautySection .wrap{padding:36px 14px 22px}
      #beautySection .track{grid-auto-columns:88%}
      #beautySection .thumb{aspect-ratio:1/1}
      #beautySection .controls{justify-content:flex-start}
    }

    /* 아래 커스텀 스크롤바 */
    #beautySection .scrollbar{
      position:relative; height:var(--thumb-h); margin:14px 2px 0; user-select:none;
    }
    #beautySection .scrollbar .rail{
      position:absolute; inset:0; background:#f0f0f0; border-radius:999px;
    }
    #beautySection .scrollbar .thumb{
      position:absolute; top:0; left:0; height:var(--thumb-h);
      width:80px; background:#d5e6dd; border-radius:999px;
      box-shadow:inset 0 0 0 1px #cfe0d7;
      cursor:grab; transition:background .2s;
    }
    #beautySection .scrollbar .thumb:active{cursor:grabbing}
    #beautySection .scrollbar:hover .thumb{background:#c7ddcf}
    #beautySection .divider{height:1px;background:var(--line);margin:18px 0 0}
  </style>

  <div class="wrap">
    <div class="header">
      <div class="title">
        <h2>Beauty</h2>
        <div class="subtitle">뷰티</div>
        <p class="desc">아름다움의 무한한 가능성을 품은<br/>당신을 위한 뷰티풀 모먼트</p>
      </div>
      <div class="controls">
        <button class="ctrl-btn" type="button" aria-label="이전" data-dir="-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="ctrl-btn" type="button" aria-label="다음" data-dir="1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>

    <div class="viewport">
      <div class="track" role="list">
        <!-- 카드 1 -->
        <article class="card" role="listitem" tabindex="0">
          <div class="thumb">
            <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1600&auto=format&fit=crop" alt="학술대회 현장">
            <span class="year">2025</span>
            <span class="badge">기업소식</span>
            <div class="overlay">
              <h3 class="headline">(사)대한화장품학회 춘계학술대회</h3>
              <p class="meta">25년 대한화장품학회 춘계학술대회에 참여했습니다.</p>
            </div>
          </div>
        </article>
        <!-- 카드 2 -->
        <article class="card" role="listitem" tabindex="0">
          <div class="thumb">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=1600&auto=format&fit=crop" alt="워크숍 현장">
            <span class="year">2025</span>
            <span class="badge">기업소식</span>
            <div class="overlay">
              <h3 class="headline">상반기 워크숍 개최</h3>
              <p class="meta">2025년 상반기 워크숍 개최 보고</p>
            </div>
          </div>
        </article>
        <!-- 카드 3 -->
        <article class="card" role="listitem" tabindex="0">
          <div class="thumb">
            <img src="https://images.unsplash.com/photo-1595341888016-a392ef81b7de?q=80&w=1600&auto=format&fit=crop" alt="뷰티 신제품">
            <span class="year">2025</span>
            <span class="badge">뉴스레터</span>
            <div class="overlay">
              <h3 class="headline">스트레스가 피부에 남기는 흔적<br><span style="color:#b3ff59">뉴로코스메틱의 해답</span></h3>
              <p class="meta">스킨 사이언스 인사이트</p>
            </div>
          </div>
        </article>
        <!-- 카드 4 -->
        <article class="card" role="listitem" tabindex="0">
          <div class="thumb">
            <img src="https://images.unsplash.com/photo-1526253038957-bce54e05968a?q=80&w=1600&auto=format&fit=crop" alt="연구 현장">
            <span class="year">2025</span>
            <span class="badge">뉴스레터</span>
            <div class="overlay">
              <h3 class="headline">피부 장벽 연구 리포트</h3>
              <p class="meta">Quarterly Research Update</p>
            </div>
          </div>
        </article>
      </div>

      <!-- 커스텀 스크롤바 -->
      <div class="scrollbar" aria-hidden="false">
        <div class="rail"></div>
        <div class="thumb" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </div>
    </div>

    <div class="divider"></div>
  </div>

  <script>
    (function(){
      const root = document.querySelector('#beautySection');
      if(!root) return;

      const track   = root.querySelector('.track');
      const cards   = Array.from(root.querySelectorAll('.card'));
      const prevBtn = root.querySelector('.ctrl-btn[data-dir="-1"]');
      const nextBtn = root.querySelector('.ctrl-btn[data-dir="1"]');

      const bar     = root.querySelector('.scrollbar');
      const rail    = bar.querySelector('.rail');
      const thumb   = bar.querySelector('.thumb');

      const gap = parseFloat(getComputedStyle(root).getPropertyValue('--gap')) || 22;

      /* ---------- Helpers ---------- */
      function slideWidth(){
        if(!cards.length) return track.clientWidth;
        return cards[0].offsetWidth + gap;
      }
      function maxScroll(){ return track.scrollWidth - track.clientWidth; }
      function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

      /* 한 장씩 이동 */
      function scrollBySlide(dir){
        const amount = slideWidth() * dir;
        track.scrollBy({ left: amount, behavior:'smooth' });
      }

      /* 스크롤 종료 시 가장 가까운 카드로 스냅 보정 */
      let snapTimer;
      function snapToNearest(){
        clearTimeout(snapTimer);
        snapTimer = setTimeout(()=>{
          const w = slideWidth();
          const idx = Math.round(track.scrollLeft / w);
          const target = idx * w;
          track.scrollTo({ left: target, behavior:'smooth' });
        }, 80);
      }

      /* 버튼 이벤트 */
      prevBtn.addEventListener('click', ()=> scrollBySlide(-1));
      nextBtn.addEventListener('click', ()=> scrollBySlide(1));

      /* 드래그로 스크롤 */
      let isDown = false, startX = 0, startScroll = 0, moved=false;
      track.addEventListener('pointerdown', (e)=>{
        isDown = true; moved=false;
        track.setPointerCapture(e.pointerId);
        startX = e.clientX; startScroll = track.scrollLeft;
      }, {passive:true});

      track.addEventListener('pointermove', (e)=>{
        if(!isDown) return;
        const dx = e.clientX - startX;
        if(Math.abs(dx) > 2) moved = true;
        track.scrollLeft = startScroll - dx;
        syncBar(); // 스크롤바 연동
      }, {passive:true});

      track.addEventListener('pointerup', (e)=>{
        if(isDown){ isDown=false; track.releasePointerCapture(e.pointerId); snapToNearest(); }
      }, {passive:true});
      track.addEventListener('pointercancel', ()=>{ isDown=false; });

      /* 스크롤바 연동 */
      function syncBar(){
        const ratio = maxScroll() ? (track.scrollLeft / maxScroll()) : 0;
        const railW = rail.clientWidth;
        const thumbW = Math.max(railW * (track.clientWidth / track.scrollWidth), 40);
        const x = (railW - thumbW) * ratio;
        thumb.style.width = thumbW + 'px';
        thumb.style.transform = `translateX(${x}px)`;
        thumb.setAttribute('aria-valuenow', Math.round(ratio*100));
      }
      track.addEventListener('scroll', syncBar, {passive:true});
      window.addEventListener('resize', syncBar);

      /* 스크롤바 클릭 이동 */
      rail.addEventListener('pointerdown', (e)=>{
        const rect = rail.getBoundingClientRect();
        const railW = rect.width;
        const thumbW = thumb.offsetWidth || 40;
        let x = clamp(e.clientX - rect.left - thumbW/2, 0, railW - thumbW);
        const ratio = x / (railW - thumbW);
        track.scrollTo({ left: ratio * maxScroll(), behavior:'smooth' });
      });

      /* 스크롤바 드래그 */
      (function(){
        let dragging=false, startX=0, startLeft=0;
        thumb.addEventListener('pointerdown', (e)=>{
          dragging=true; startX=e.clientX;
          startLeft = (thumb.style.transform.match(/translateX\(([-\d.]+)px\)/)||[0,0])[1]*1 || 0;
          thumb.setPointerCapture(e.pointerId);
        });
        thumb.addEventListener('pointermove', (e)=>{
          if(!dragging) return;
          const rect = rail.getBoundingClientRect();
          const railW = rect.width;
          const thumbW = thumb.offsetWidth;
          let x = clamp(startLeft + (e.clientX - startX), 0, railW - thumbW);
          const ratio = (railW - thumbW) ? x / (railW - thumbW) : 0;
          track.scrollLeft = ratio * maxScroll();
          thumb.style.transform = `translateX(${x}px)`;
        }, {passive:true});
        const end = (e)=>{ if(dragging){ dragging=false; thumb.releasePointerCapture?.(e.pointerId); snapToNearest(); } };
        thumb.addEventListener('pointerup', end);
        thumb.addEventListener('pointercancel', ()=> dragging=false);
      })();

      /* 초기 동기화 */
      syncBar();

      /* 링크처럼 쓰고 싶으면 data-href 사용 */
      root.querySelectorAll('.card[data-href]').forEach(card=>{
        card.addEventListener('click', (e)=>{
          // 드래그로 이동한 직후의 클릭은 무시
          if(moved){ moved=false; return; }
          location.href = card.getAttribute('data-href');
        });
      });
    })();
  </script>
</section>
